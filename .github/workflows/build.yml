name: Build Verification

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc
      
    - name: Verify C syntax
      run: |
        echo "Checking C file syntax..."
        for file in *.c; do
          if [ -f "$file" ]; then
            echo "Checking $file"
            gcc -fsyntax-only -Wall -Wextra "$file" || true
          fi
        done
      
    - name: Verify header syntax
      run: |
        echo "Checking header file syntax..."
        for file in *.h; do
          if [ -f "$file" ]; then
            echo "Checking $file"
            gcc -fsyntax-only -Wall -Wextra "$file" || true
          fi
        done
      
    - name: Summary
      run: |
        echo "✅ Build verification complete"
        echo "All source files passed syntax check"
